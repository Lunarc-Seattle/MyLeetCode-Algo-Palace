name: Update LeetCode Stats

# 触发条件
on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 时间 0 点（北京时间早上 8 点，美西下午 5 点）自动运行
  workflow_dispatch: # 允许你在网页上手动点击按钮运行

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        
      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 安装依赖
        run: pip install requests
        
      - name: 运行更新脚本
        run: python update_readme.py
        
      - name: 提交并推送到 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          # 如果 README 有变化就提交，没变化就跳过
          git commit -m "Auto-update LeetCode stats" || exit 0
          git push
